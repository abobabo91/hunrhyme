<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hun rhyme — magyar rímkereső</title>
<style>
:root{--bg:#0b1020;--panel:#111832;--accent:#5eead4;--accent2:#a78bfa;--accent3:#facc15;--hl:#34d399;--text:#e6e9f2;--muted:#9aa3b2}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:radial-gradient(1200px 700px at 80% -20%,#1e2749 0%,#0b1020 60%) fixed;color:var(--text);min-height:100vh}
header{padding:20px;max-width:1280px;margin:0 auto}
h1{margin:0;font-weight:800;font-size:32px}
.sub{color:var(--muted);margin:6px 0 0;font-size:14px}
main{display:grid;grid-template-columns:340px 1fr;gap:18px;padding:0 20px 32px;max-width:1280px;margin:0 auto}
@media (max-width:880px){main{grid-template-columns:1fr}}

.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.sidebar{position:sticky;top:14px;align-self:start}
.sidebar h2{margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}

.row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.row .row-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.row .row-head b{color:var(--text);font-size:13px}
.row input[type=range]{width:100%;accent-color:var(--accent)}
.row .help{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px}

.checkbox{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.35;margin-bottom:10px;cursor:pointer;user-select:none}
.checkbox input{accent-color:var(--accent);margin-top:3px;flex-shrink:0;cursor:pointer}
.checkbox .help{display:block;font-size:11px;color:var(--muted);line-height:1.35;margin-top:2px}

.main-area input[type=text]{width:100%;padding:14px 18px;font-size:18px;background:#0f152b;color:var(--text);border:1px solid rgba(255,255,255,.15);border-radius:12px;outline:none;transition:border-color .15s}
.main-area input[type=text]:focus{border-color:var(--accent)}

#status{margin:14px 4px;font-size:13px;color:var(--muted)}
#status.error{color:#fb7185}
#status.ready{color:var(--accent)}

.search-bar{display:flex;justify-content:space-between;align-items:baseline;margin:18px 4px 12px}
.search-bar .query-echo{font-size:18px;line-height:1.4}
.search-bar .count{font-size:13px;color:var(--muted)}

#results{display:flex;flex-direction:column;gap:6px}
.result{display:grid;grid-template-columns:1fr 90px;gap:10px;padding:10px 14px;background:rgba(15,21,43,.5);border:1px solid rgba(255,255,255,.06);border-radius:10px;align-items:center}
.result .line{font-size:16px;line-height:1.4}
.result .strength{font-size:11px;color:var(--muted);text-align:right;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.result .strength b{color:var(--accent2);font-size:14px;display:block}
.result details{margin-top:6px;grid-column:1/-1}
.result summary{cursor:pointer;font-size:11px;color:var(--accent2);user-select:none;list-style:none}
.result summary::-webkit-details-marker{display:none}
.result summary::before{content:'▸ ';color:var(--muted)}
.result details[open] summary::before{content:'▾ '}
.result .context{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.1);font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.5;color:var(--muted);white-space:pre-wrap}
.result .context .target{color:var(--text);font-weight:700}

.cross-tag{font-size:10px;color:var(--accent2);background:rgba(167,139,250,.15);padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

.hl{color:var(--hl);font-weight:700}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

footer{padding:24px 20px 40px;max-width:1280px;margin:0 auto;color:var(--muted);font-size:12px;text-align:center}
footer a{color:var(--accent2);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <h1>hun rhyme</h1>
  <p class="sub">magyar rímkereső — magánhangzó-egyezések alapján</p>
</header>
<main>
  <aside class="card sidebar">
    <h2>beállítás</h2>
    <div class="row">
      <div class="row-head"><span>Egyező magánhangzók száma</span><b id="match_len_val">4</b></div>
      <input type="range" id="match_len" min="1" max="10" value="4">
      <div class="help">legalább hány magánhangzónak kell egyeznie a sorok végén.</div>
    </div>
    <label class="checkbox">
      <input type="checkbox" id="loose_match" checked>
      <span>Hosszú-rövid magánhangzók párosítása<span class="help">megengedi, hogy a hasonló de eltérő hosszúságú magánhangzók rímeljenek (o-ó, ö-ő, u-ú, ü-ű, i-í). Az 'a-á' és 'e-é' különbözik.</span></span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="rhythm_match">
      <span>Ritmikai szűrő (szószerkezet)<span class="help">csak olyan találatok ahol a szavak magánhangzó-eloszlása azonos. Pl. „sárga rózsa" (2+2) rímel „drága lóra" (2+2)-re.</span></span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="internal_rhyme">
      <span>Belső rímek keresése és kiemelése<span class="help">olyan sorokat is megtalál, amik nem csak a végükön rímelnek, és a belső rímelő részeket is zölddel kiemeli.</span></span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="cross_line">
      <span>Kereszt-soros rímek<span class="help">olyan rímeket is keres, amik egy sor végén kezdődnek és a következő sor elején folytatódnak.</span></span>
    </label>
  </aside>

  <section class="main-area">
    <input type="text" id="user_input" placeholder="pl. mindig egy nő meg a pénz" autocomplete="off" autofocus>
    <div id="status">Adatok betöltése…</div>
    <div id="search-bar"></div>
    <div id="results"></div>
  </section>
</main>
<footer>
  forráskód: <a href="https://github.com/abobabo91/hunrhyme">github.com/abobabo91/hunrhyme</a>
</footer>

<script>
const VOWEL_CHARS = 'aáeéiíoóöőuúüűAÁEÉIÍOÓÖŐUÚÜŰ';
const VOWEL_RE = /[^aáeéiíoóöőuúüűAÁEÉIÍOÓÖŐUÚÜŰ]/g;

function escapeHTML(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getVowels(text){
  return text.replace(VOWEL_RE,'').toLowerCase();
}

function getWordVowelCounts(text){
  return text.split(/\s+/).filter(Boolean).map(w => getVowels(w).length).filter(n => n > 0);
}

function normalizeVowels(vowels, looseMatching){
  vowels = vowels.replaceAll('õ','ö').replaceAll('ô','ö').replaceAll('û','ü');
  if(!looseMatching) return vowels;
  return vowels
    .replaceAll('ó','o').replaceAll('ő','ö').replaceAll('ú','u').replaceAll('ű','ü').replaceAll('í','i');
}

function getMatchLength(v1, v2){
  let m = 0;
  const max = Math.min(v1.length, v2.length);
  for(let i = 1; i <= max; i++){
    if(v1[v1.length - i] === v2[v2.length - i]) m++;
    else break;
  }
  return m;
}

function highlightVowels(text, mask){
  let out = '';
  let vIdx = 0;
  for(const ch of text){
    if(VOWEL_CHARS.includes(ch)){
      const hl = mask ? (vIdx < mask.length ? mask[vIdx] : false) : true;
      if(hl) out += `<span class="hl">${escapeHTML(ch)}</span>`;
      else out += escapeHTML(ch);
      vIdx++;
    } else {
      out += escapeHTML(ch);
    }
  }
  return out;
}

function getRhymeMask(inputVowels, lineVowels, matchCount, includeInternal){
  const mask = new Array(lineVowels.length).fill(false);
  const mLen = getMatchLength(inputVowels, lineVowels);
  if(mLen >= matchCount){
    for(let i = 1; i <= mLen; i++) mask[mask.length - i] = true;
  }
  if(!includeInternal) return mask;
  const subs = new Set();
  for(let i = 0; i <= inputVowels.length - matchCount; i++){
    subs.add(inputVowels.substring(i, i + matchCount));
  }
  for(let i = 0; i <= lineVowels.length - matchCount; i++){
    const sub = lineVowels.substring(i, i + matchCount);
    if(subs.has(sub)){
      for(let j = i; j < i + matchCount; j++) mask[j] = true;
    }
  }
  return mask;
}

function findRhymes(inputText, filteredLines, matchCount, looseMatching, rhythmMatching, internalRhyme, crossLine){
  const inputVowels = normalizeVowels(getVowels(inputText), looseMatching);
  const inputStruct = getWordVowelCounts(inputText);
  if(!inputVowels) return [];
  const suffix = inputVowels.substring(inputVowels.length - matchCount);
  const results = [];
  const seenLines = new Set();

  for(const line of filteredLines){
    if(seenLines.has(line)) continue;
    const lineVowels = normalizeVowels(getVowels(line), looseMatching);

    if(rhythmMatching){
      const lineStruct = getWordVowelCounts(line);
      if(lineStruct.length !== inputStruct.length) continue;
      if(inputStruct.length > 1){
        let same = true;
        for(let i = 1; i < inputStruct.length; i++){
          if(lineStruct[i] !== inputStruct[i]){ same = false; break; }
        }
        if(!same) continue;
      }
      const remaining = inputStruct.slice(1).reduce((a,b)=>a+b, 0);
      const needed = Math.max(0, matchCount - remaining);
      if(lineStruct[0] < needed) continue;
    }

    let isMatch = false;
    let mLen = 0;

    if(lineVowels.endsWith(suffix)){
      isMatch = true;
      mLen = getMatchLength(inputVowels, lineVowels);
    } else if(internalRhyme && lineVowels.includes(suffix)){
      isMatch = true;
      outer:
      for(let length = inputVowels.length; length >= matchCount; length--){
        for(let i = 0; i <= inputVowels.length - length; i++){
          const sub = inputVowels.substring(i, i + length);
          if(lineVowels.includes(sub)){ mLen = length; break outer; }
        }
      }
    }

    if(isMatch){
      const mask = getRhymeMask(inputVowels, lineVowels, matchCount, internalRhyme);
      results.push({ type:'single', line, strength: mLen, mask });
      seenLines.add(line);
    }
  }

  if(crossLine){
    for(let i = 0; i < filteredLines.length - 1; i++){
      const line1 = filteredLines[i];
      const line2 = filteredLines[i + 1];
      const v1 = normalizeVowels(getVowels(line1), looseMatching);
      const v2 = normalizeVowels(getVowels(line2), looseMatching);
      let foundCross = false;
      let bestM = 0, m1Out = 0, m2Out = 0;
      for(let splitIdx = 1; splitIdx < matchCount; splitIdx++){
        const part2Len = matchCount - splitIdx;
        const s1 = inputVowels.substring(inputVowels.length - matchCount, inputVowels.length - part2Len);
        const s2 = inputVowels.substring(inputVowels.length - part2Len);
        if(v1.endsWith(s1) && v2.startsWith(s2)){
          foundCross = true;
          const m1 = getMatchLength(inputVowels.substring(0, inputVowels.length - part2Len), v1);
          let m2 = 0;
          const remInput = inputVowels.substring(inputVowels.length - part2Len);
          for(let k = 0; k < Math.min(remInput.length, v2.length); k++){
            if(remInput[k] === v2[k]) m2++;
            else break;
          }
          bestM = m1 + m2; m1Out = m1; m2Out = m2;
          break;
        }
      }
      if(foundCross){
        const mask1 = new Array(v1.length).fill(false);
        for(let k = 1; k <= m1Out; k++) mask1[mask1.length - k] = true;
        const mask2 = new Array(v2.length).fill(false);
        for(let k = 0; k < m2Out; k++) mask2[k] = true;
        results.push({ type:'cross', line1, line2, strength: bestM, mask1, mask2 });
      }
    }
  }

  results.sort((a,b)=>b.strength - a.strength);
  return results;
}

// ---- App ----
let filteredLines = null;
let fullLines = null;
let fullLineIndex = null; // Map<line, idx>

const ui = {
  matchLen: document.getElementById('match_len'),
  matchLenVal: document.getElementById('match_len_val'),
  loose: document.getElementById('loose_match'),
  rhythm: document.getElementById('rhythm_match'),
  internal: document.getElementById('internal_rhyme'),
  cross: document.getElementById('cross_line'),
  input: document.getElementById('user_input'),
  status: document.getElementById('status'),
  searchBar: document.getElementById('search-bar'),
  results: document.getElementById('results'),
};

ui.matchLen.addEventListener('input', () => { ui.matchLenVal.textContent = ui.matchLen.value; scheduleSearch(); });
ui.loose.addEventListener('change', scheduleSearch);
ui.rhythm.addEventListener('change', scheduleSearch);
ui.internal.addEventListener('change', scheduleSearch);
ui.cross.addEventListener('change', scheduleSearch);
ui.input.addEventListener('input', scheduleSearch);

let searchTimer = null;
function scheduleSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, 220);
}

function runSearch(){
  const q = ui.input.value.trim();
  if(!filteredLines){
    ui.searchBar.innerHTML = '';
    ui.results.innerHTML = '';
    return;
  }
  if(!q){
    ui.searchBar.innerHTML = '';
    ui.results.innerHTML = '<div class="empty">Írj be valamit a kezdéshez!</div>';
    return;
  }
  const t0 = performance.now();
  const matchCount = parseInt(ui.matchLen.value, 10);
  const rhymes = findRhymes(
    q, filteredLines, matchCount,
    ui.loose.checked, ui.rhythm.checked, ui.internal.checked, ui.cross.checked
  );
  const elapsed = performance.now() - t0;

  ui.searchBar.innerHTML = `
    <div class="search-bar">
      <div class="query-echo">Keresés: ${highlightVowels(q)}</div>
      <div class="count">${rhymes.length} találat · ${elapsed.toFixed(0)}ms</div>
    </div>`;

  if(!rhymes.length){
    ui.results.innerHTML = '<div class="empty">Nincs találat.</div>';
    return;
  }

  const MAX = 500;
  const visible = rhymes.slice(0, MAX);
  const frag = document.createDocumentFragment();
  for(const r of visible){
    const card = document.createElement('div');
    card.className = 'result';
    if(r.type === 'single'){
      const html = highlightVowels(r.line, r.mask);
      card.innerHTML = `<div class="line">${html}</div><div class="strength"><b>${r.strength}</b>magánhangzó</div>`;
      attachContext(card, r.line);
    } else {
      const h1 = highlightVowels(r.line1, r.mask1);
      const h2 = highlightVowels(r.line2, r.mask2);
      card.innerHTML = `<div class="line">${h1} / ${h2} <span class="cross-tag">kereszt</span></div><div class="strength"><b>${r.strength}</b>magánhangzó</div>`;
      attachContext(card, r.line1, r.line2);
    }
    frag.appendChild(card);
  }
  if(rhymes.length > MAX){
    const more = document.createElement('div');
    more.className = 'empty';
    more.textContent = `… és további ${rhymes.length - MAX} találat (csak az első ${MAX}-et mutatjuk).`;
    frag.appendChild(more);
  }
  ui.results.innerHTML = '';
  ui.results.appendChild(frag);
}

function attachContext(card, target, target2){
  if(!fullLines || !fullLineIndex) return;
  const idx = fullLineIndex.get(target);
  if(idx == null) return;
  const det = document.createElement('details');
  det.innerHTML = '<summary>Szövegkörnyezet</summary>';
  det.addEventListener('toggle', () => {
    if(!det.open || det.dataset.loaded) return;
    det.dataset.loaded = '1';
    const start = Math.max(0, idx - 2);
    const end = Math.min(fullLines.length, idx + 4);
    const lines = fullLines.slice(start, end);
    const ctx = document.createElement('div');
    ctx.className = 'context';
    let s = '';
    for(const line of lines){
      const stripped = line.trim();
      if(stripped === target || (target2 && stripped === target2)){
        s += `<span class="target">→ ${escapeHTML(line)}</span>\n`;
      } else {
        s += escapeHTML('   ' + line) + '\n';
      }
    }
    ctx.innerHTML = s;
    det.appendChild(ctx);
  });
  card.appendChild(det);
}

async function loadData(){
  ui.status.textContent = 'Adatok betöltése…';
  try {
    const [filteredResp, fullResp] = await Promise.all([
      fetch('full_filtered.txt'),
      fetch('full.txt'),
    ]);
    if(!filteredResp.ok) throw new Error('full_filtered.txt: ' + filteredResp.status);
    if(!fullResp.ok)     throw new Error('full.txt: '          + fullResp.status);
    const [filteredTxt, fullTxt] = await Promise.all([filteredResp.text(), fullResp.text()]);
    filteredLines = filteredTxt.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    fullLines = fullTxt.split(/\r?\n/);
    fullLineIndex = new Map();
    for(let i = 0; i < fullLines.length; i++){
      const t = fullLines[i].trim();
      if(t && !fullLineIndex.has(t)) fullLineIndex.set(t, i);
    }
    ui.status.classList.add('ready');
    ui.status.textContent = `Adatok betöltve: ${filteredLines.length.toLocaleString('hu')} sor.`;
    runSearch();
  } catch(err){
    ui.status.classList.add('error');
    ui.status.textContent = 'Adatok betöltése sikertelen: ' + err.message;
  }
}

loadData();
</script>
</body>
</html>
